<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Post</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .box {
    background: #fff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    width: 350px;
  }
  h2 {
    text-align: center;
    margin-bottom: 20px;
  }
  input, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: inherit;
  }
  textarea {
    height: 100px;
    resize: vertical;
  }
  button {
    width: 100%;
    padding: 10px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
  }
  button:hover {
    background: #1976D2;
  }
  #msg {
    margin-top: 12px;
    text-align: center;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="box">
  <h2>Create Post</h2>
  <input type="text" id="title" placeholder="Title">
  <textarea id="content" placeholder="Content"></textarea>
  <button onclick="createPost()">Send</button>
  <div id="msg"></div>
</div>

<script>
// TODO: put your create-post API URL here
const POST_API_URL = "http://127.0.0.1:8000/posts";

function createPost() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const msg = document.getElementById("msg");

  if (!title || !content) {
    msg.style.color = "red";
    msg.textContent = "Please fill both fields.";
    return;
  }

  // create post is sent as JSON
  const data = {
    title: title,
    content: content
  };

  // grab the token saved during login
  const token = sessionStorage.getItem("access_token");

  msg.style.color = "black";
  msg.textContent = "Sending...";

  fetch(POST_API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify(data)
  })
  .then(response => {
    if (response.status === 200 || response.status===201) {
      msg.style.color = "green";
      msg.textContent = "Send";
    } else {
      window.location.href = "error.html";
    }
  })
  .catch(error => {
    window.location.href = "error.html";
  });
}
</script>

</body>
</html>
